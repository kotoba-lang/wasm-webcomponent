<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>kotoba-wasm-element: hello example</title>
</head>
<body>
<h1>hello.wasm (zero imports)</h1>
<p>
  <code>hello.wasm</code> is the byte-for-byte output of
  <code>kotoba wasm emit src/demo.kotoba</code> in kotoba-lang/kotoba
  (73 bytes, exports <code>main() : i32</code> which returns 42).
  <code>KotobaWasmElement.define('hello-wasm-run')</code> is all it takes to
  host it -- no per-module JS beyond that one call.
</p>
<hello-wasm-run src="./hello.wasm"></hello-wasm-run>
<script type="module">
  import { KotobaWasmElement } from '../../src/kotoba-wasm-element.js';
  KotobaWasmElement.define('hello-wasm-run');
</script>
</body>
</html>
