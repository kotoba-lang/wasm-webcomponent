name: test
on:
  push:
    branches: [main]
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: node test/verify-hello.mjs
      - run: node test/verify-kgraph.mjs
      - run: node test/verify-gcd.mjs
