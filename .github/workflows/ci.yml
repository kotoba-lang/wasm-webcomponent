name: test
on:
  push:
    branches: [main]
  pull_request:
jobs:
  test:
    # GPU-free, dependency-free-logic tests: AOT WebAssembly execution +
    # host-import behavior (test/verify-*.mjs) run against Node's own
    # WebAssembly engine (same V8 a Chromium browser uses). `npm test` runs
    # every test/verify-*.mjs file -- previously this job hardcoded only 4 of
    # what are now 8 (verify-actor-host.mjs/verify-kami-engine-host.mjs/
    # verify-gpu-clear-host.mjs/verify-solar-render-host.mjs had never been
    # wired in since they were added), a real CI gap this closes.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm ci
      - run: npm test

  actor-host-browser-verify:
    # Real-browser (headless Chromium) DOM/custom-element E2E for
    # actor-host.js + KotobaWasmElement (test/browser/verify_actor_host_browser.cljs,
    # run via nbb per CLAUDE.md's "new Node-side test harnesses are nbb, not
    # .mjs/.cjs" rule). test/verify-actor-host.mjs already covers the same
    # host-fn logic via Node's own WebAssembly.instantiate directly; this is
    # the customElements/shadow-DOM/`<script type="module">` layer that
    # never had coverage before (no ADR/ubuntu-latest constraint like
    # render-verify's WebGPU job -- no GPU involved here, plain WASM +
    # crypto + DOM).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:browser

  http-post-browser-verify:
    # Real-browser (headless Chromium) end-to-end verification that
    # `http-post` actually completes a real HTTP POST round-trip through
    # `createSabHttpPostBridge` (src/http-post-bridge.js) from inside a real
    # Worker-hosted WASM guest, on a page served with real COOP/COEP headers
    # (test/browser/verify_http_post_browser.cljs). Distinct from
    # actor-host-browser-verify above: that job covers the 7 imports that
    # run on the main thread; this one is specifically the Worker+SAB+Atomics
    # bridge path, which needed its own guest fixture (compiled at test time
    # via `wasm-tools`, since the target URL's port isn't known until the
    # test's local echo server is listening).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Install wasm-tools
        run: |
          curl -sSfL https://github.com/bytecodealliance/wasm-tools/releases/download/v1.253.0/wasm-tools-1.253.0-x86_64-linux.tar.gz | tar xz
          echo "$PWD/wasm-tools-1.253.0-x86_64-linux" >> "$GITHUB_PATH"
      - run: npm run test:http-post-browser

  render-verify:
    # Real-pixel WebGPU render verification (test/render/verify-render-*.mjs)
    # -- actually drives a headless browser and asserts on decoded canvas
    # pixel data, closing the gap ADR-2607078000 Addendum 7 left open (the
    # pure math/mesh helpers had unit coverage, but pipeline creation, bind
    # groups, queue.submit timing, and the actual rendered pixels did not,
    # and needed a human with claude-in-chrome to eyeball a screenshot).
    #
    # Runs on macos-latest deliberately, not ubuntu-latest: this needs a real
    # GPU. GitHub's ubuntu-latest runners have none, and this repo's own
    # investigation (see README's "Automated render verification" section)
    # found headless Chromium + SwiftShader software rendering on Linux
    # unreliable in practice (a Docker container matching this exact image
    # produced "Instance dropped in popErrorScope" WebGPU errors and blank
    # canvases). macos-latest runners are real Apple Silicon hardware with a
    # working Metal-backed GPU process, which this was verified against
    # directly and found to render correctly and deterministically.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm ci
      - run: npx playwright install chromium
      - run: npm run test:render
